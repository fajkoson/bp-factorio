[runtime]
factorio_executable = d:\gamez\steamapps\common\Factorio\bin\x64\factorio.exe
disable_audio = true
no_log_rotation = false
disable_auto_updates = false
mod_directory = false

[benchmark]
ticks = 5000
runs = 30
platform = x64
map_pattern = .zip
output_file = test_results.csv

[debug]
verbose = false

[plot]
enable_plots = true
combined_boxplot = true
average_barplot = true
label_font = monospace
label_font_size = 8
label_font_color = gray
axis_color = gray
spine_color = gray
spine_width = 1
figure_facecolor = black
axes_facecolor = black
bar_color = slategrey
box_color = slategrey
show_grid = false
dpi = 100
figsize = 10x5
style = style[2]

[stylelist]
style[0] = Solarize_Light2, classic, bmh, dark_background, fast
style[1] = fivethirtyeight, ggplot, grayscale, seaborn-v0_8
style[2] = seaborn-v0_8-bright, seaborn-v0_8-colorblind


